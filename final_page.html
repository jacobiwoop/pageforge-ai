<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Cuisine Italienne</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Montserrat', sans-serif;
    }
    
    .bg-grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    
    @keyframes fade-in-up {
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in-up {
      animation: fade-in-up 0.6s ease-out forwards;
    }
    
    @media (prefers-reduced-motion: reduce) {
      .group:hover .group-hover\\:scale-110 {
        transform: none;
      }
      .transition-all, .duration-300, .ease-out, .duration-700, .ease-in-out {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div class="bg-grain min-h-screen flex items-center justify-center">
    <div class="container max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="bg-white rounded-xl shadow-lg overflow-hidden animate-fade-in-up">
        <div class="aspect-square w-full overflow-hidden group">
          <img 
            src="https://images.unsplash.com/photo-1504674900247-08f84a1f6390?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
            alt="Assiette de spaghetti Bolognese avec sauce tomate rouge, herbes fraîches et parmesan sur fond neutre"
            class="object-cover w-full h-full transition-transform duration-700 ease-in-out group-hover:scale-110"
            loading="lazy"
            srcset="
              https://images.unsplash.com/photo-1504674900247-08f84a1f6390?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80 600w,
              https://images.unsplash.com/photo-1504674900247-08f84a1f6390?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80 1200w,
              https://images.unsplash.com/photo-1504674900247-08f84a1f6390?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80 1920w
            "
            sizes="(max-width: 768px) 100vw, (max-width: 1200px) 50vw, 33vw"
          >
        </div>
        <div class="p-8 text-center">
          <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-6 tracking-tight">Cuisine Italienne</h1>
          <p class="text-slate-600 text-base md:text-lg mb-8 max-w-2xl mx-auto leading-relaxed">
            Des recettes authentiques, préparées avec des ingrédients frais et traditionnels, pour un plaisir culinaire italien inoubliable.
          </p>
          <button 
            class="bg-red-600 text-white font-semibold py-3 px-8 rounded-md transition-all duration-300 ease-out hover:bg-red-700 hover:translate-y-1 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-600"
            aria-label="Commander votre plat italien"
          >
            Commander
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
