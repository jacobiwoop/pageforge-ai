<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Artisanal Sportswear | Precision Performance Gear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Montserrat', 'sans-serif'],
          },
          colors: {
            'sportswear': {
              bg: '#F8FAFC',
              surface: '#FFFFFF',
              primary: '#1E3A5F',
              secondary: '#64748B',
              accent: '#DC2626',
              accentHover: '#B91C1C',
              border: '#E2E8F0',
            }
          },
          boxShadow: {
            'level-1': '0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
            'level-2': '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
            'level-3': '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)',
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              to: { opacity: '1', transform: 'translateY(0)' },
            },
          },
        }
      }
    }
  </script>
  <style>
    .font-heading { font-family: 'Montserrat', sans-serif; }
    .font-body { font-family: 'Inter', sans-serif; }
    .bg-grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    .aspect-square { aspect-ratio: 1 / 1; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body class="bg-sportswear-bg font-body text-sportswear-primary antialiased">
  <div id="root"></div>

  <script type="module">
    import { createRoot } from 'https://cdn.jsdelivr.net/npm/react@18.2.0/+esm'
    import { createRoot } from 'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/+esm'

    const products = [
      {
        id: 1,
        name: 'Pro Performance T-Shirt',
        category: 'Tops',
        price: 89.99,
        image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600&h=600&fit=crop',
        alt: 'Black moisture-wicking performance t-shirt with athletic fit',
      },
      {
        id: 2,
        name: 'Elite Training Shorts',
        category: 'Bottoms',
        price: 74.99,
        image: 'https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=600&h=600&fit=crop',
        alt: 'Grey athletic training shorts with sweat-wicking technology',
      },
      {
        id: 3,
        name: 'Velocity Running Shoes',
        category: 'Footwear',
        price: 149.99,
        image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&h=600&fit=crop',
        alt: 'Red and white lightweight running shoes with aerodynamic design',
      },
      {
        id: 4,
        name: 'Mountain Jacket',
        category: 'Outerwear',
        price: 189.99,
        image: 'https://images.unsplash.com/photo-1515763663268-1343923c923c?w=600&h=600&fit=crop',
        alt: 'Navy blue weather-resistant outdoor jacket with technical features',
      },
      {
        id: 5,
        name: 'Training Headband',
        category: 'Accessories',
        price: 29.99,
        image: 'https://images.unsplash.com/photo-1517486848745-3a7b53797960?w=600&h=600&fit=crop',
        alt: 'Black sweatband moisture-wicking headband for athletic use',
      },
      {
        id: 6,
        name: 'Gym Performance Gloves',
        category: 'Accessories',
        price: 44.99,
        image: 'https://images.unsplash.com/photo-1552155667-365427120476?w=600&h=600&fit=crop',
        alt: 'Black and grey weightlifting gloves with palm support',
      },
    ]

    const Navigation = () => (
      <nav className="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex justify-between items-center h-16">
            <div className="flex items-center gap-8">
              <a href="#" className="font-heading text-2xl font-bold tracking-tight text-sportswear-primary">
                ATHLETICA
              </a>
              <div className="hidden md:flex space-x-6">
                <a href="#" className="text-sportswear-secondary hover:text-sportswear-primary transition-colors font-medium">Collections</a>
                <a href="#" className="text-sportswear-secondary hover:text-sportswear-primary transition-colors font-medium">Men</a>
                <a href="#" className="text-sportswear-secondary hover:text-sportswear-primary transition-colors font-medium">Women</a>
                <a href="#" className="text-sportswear-secondary hover:text-sportswear-primary transition-colors font-medium">Gear</a>
              </div>
            </div>
            <div className="flex items-center space-x-4">
              <button className="text-sportswear-secondary hover:text-sportswear-primary transition-colors p-2">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </button>
              <button className="text-sportswear-secondary hover:text-sportswear-primary transition-colors p-2 relative">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span className="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-sportswear-accent rounded-full">
                  0
                </span>
              </button>
            </div>
          </div>
        </div>
      </nav>
    )

    const Hero = () => (
      <section className="relative bg-sportswear-primary overflow-hidden">
        <div className="absolute inset-0 bg-grain opacity-50"></div>
        <div className="absolute inset-0 bg-sportswear-accent opacity-10"></div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 lg:py-32">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div className="space-y-8 animate-fade-in-up">
              <h1 className="font-heading text-4xl md:text-5xl lg:text-6xl font-bold text-white leading-tight">
                Precision Craftsmanship <br />
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-red-200">
                  For Elite Performance
                </span>
              </h1>
              <p className="text-lg md:text-xl text-slate-200 max-w-lg">
                Engineered for athletes who demand excellence. Our gear combines technical precision with artisanal quality for unmatched performance.
              </p>
              <div className="flex flex-col sm:flex-row gap-4">
                <button className="bg-sportswear-accent hover:bg-sportswear-accentHover text-white font-semibold py-4 px-8 rounded-md transition-all duration-300 ease-out transform hover:-translate-y-1 shadow-lg level-2">
                  Shop Collection
                </button>
                <button className="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 text-white font-semibold py-4 px-8 rounded-md transition-all duration-300 ease-out">
                  View Lookbook
                </button>
              </div>
            </div>
            <div className="relative animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
              <div className="relative aspect-square rounded-sm overflow-hidden shadow-level-3 transform hover:scale-105 transition-transform duration-700 ease-in-out">
                <img
                  src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800&h=800&fit=crop"
                  alt="Athletic athlete wearing red performance sneakers"
                  className="object-cover w-full h-full"
                  loading="eager"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <div className="absolute bottom-0 left-0 right-0 p-6">
                  <p className="text-white/90 text-sm uppercase tracking-widest mb-2">Featured Collection</p>
                  <h3 className="text-white text-2xl font-heading font-bold">Velocity Series</h3>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    )

    const ProductCard = ({ product, index }) => {
      const [loaded, setLoaded] = useState(false)

      return (
        <div 
          className="group bg-white rounded-xl overflow-hidden shadow-level-1 hover:shadow-level-2 transition-all duration-300"
          style={{ animationDelay: `${index * 0.1}s` }}
        >
          <div className="relative aspect-square w-full overflow-hidden">
            {!loaded && (
              <div className="absolute inset-0 bg-slate-200 animate-pulse"></div>
            )}
            <img
              src={product.image}
              alt={product.alt}
              className={`object-cover w-full h-full transition-transform duration-700 ease-in-out group-hover:scale-110 ${loaded ? 'opacity-100' : 'opacity-0'}`}
              loading={index > 2 ? 'lazy' : 'eager'}
              onLoad={() => setLoaded(true)}
              srcset={`${product.image}&w=400 400w, ${product.image}&w=600 600w, ${product.image}&w=800 800w`}
              sizes="(max-width: 640px) 50vw, (max-width: 1024px) 25vw, 20vw"
            />
            <div className="absolute top-3 right-3">
              <span className="bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-xs font-semibold text-sportswear-primary shadow-sm">
                {product.category}
              </span>
            </div>
          </div>
          <div className="p-5">
            <p className="text-sportswear-secondary text-xs uppercase tracking-wide mb-2">
              {product.name}
            </p>
            <div className="flex items-center justify-between">
              <span className="text-sportswear-primary font-bold text-xl">
                ${product.price.toFixed(2)}
              </span>
              <button className="text-sportswear-secondary hover:text-sportswear-primary transition-colors p-2">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.318 4.318 0 000 6.066a4.318 4.318 0 006.066 0a4.318 4.318 0 00-6.066 0zM12 2a5 5 0 015 5v10a5 5 0 01-5 5a5 5 0 01-5-5V7a5 5 0 015-5z" />
                </svg>
              </button>
            </div>
            <button className="w-full mt-4 bg-slate-50 hover:bg-slate-100 text-sportswear-primary font-medium py-2 px-4 rounded-md transition-colors duration-200">
              Quick View
            </button>
          </div>
        </div>
      )
    }

    const ProductsGrid = () => (
      <section className="py-20 bg-sportswear-bg">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="text-center mb-16">
            <h2 className="font-heading text-3xl md:text-4xl font-bold text-sportswear-primary mb-4">
              Featured Collection
            </h2>
            <p className="text-sportswear-secondary max-w-2xl mx-auto">
              Engineered for peak performance. Our curated selection of premium athletic wear designed for serious athletes.
            </p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {products.map((product, index) => (
              <ProductCard key={product.id} product={product} index={index} />
            ))}
          </div>
          <div className="mt-16 text-center">
            <button className="inline-flex items-center gap-2 text-sportswear-primary hover:text-sportswear-accent transition-colors font-medium">
              View All Products
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
              </svg>
            </button>
          </div>
        </div>
      </section>
    )

    const Features = () => (
      <section className="py-20 bg-white border-b border-slate-200">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
            {[
              { title: 'Technical Precision', desc: 'Engineered for optimal performance with advanced moisture-wicking technology', icon: '⚡' },
              { title: 'Artisan Quality', desc: 'Crafted with premium materials and meticulous attention to detail', icon: '✨' },
              { title: 'Elite Performance', desc: 'Designed by athletes, for athletes who demand excellence', icon: '🏆' },
            ].map((feature, i) => (
              <div key={i} className="text-center space-y-4">
                <div className="inline-block p-4 bg-sportswear-bg rounded-xl text-4xl">
                  {feature.icon}
                </div>
                <h3 className="font-heading text-xl font-bold text-sportswear-primary">{feature.title}</h3>
                <p className="text-sportswear-secondary">{feature.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    )

    const Footer = () => (
      <footer className="bg-sportswear-primary py-16">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="grid grid-cols-1 md:grid-cols-4 gap-12">
            <div className="space-y-4">
              <h4 className="font-heading text-2xl font-bold text-white">ATHLETICA</h4>
              <p className="text-slate-300 text-sm">
                Precision performance gear for elite athletes. Engineered with technical excellence and artisanal craftsmanship.
              </p>
            </div>
            <div>
              <h5 className="text-white font-bold mb-4 uppercase tracking-wider text-xs">Shop</h5>
              <ul className="space-y-2 text-slate-300 text-sm">
                <li><a href="#" className="hover:text-white transition-colors">Men's Collection</a></li>
                <li><a href="#" className="hover:text-white transition-colors">Women's Collection</a></li>
                <li><a href="#" className="hover:text-white transition-colors">Latest Arrivals</a></li>
                <li><a href="#" className="hover:text-white transition-colors">Best Sellers</a></li>
              </ul>
            </div>
            <div>
              <h5 className="text-white font-bold mb-4 uppercase tracking-wider text-xs">Support</h5>
              <ul className="space-y-2 text-slate-300 text-sm">
                <li><a href="#" className="hover:text-white transition-colors">Order Status</a></li>
                <li><a href="#" className="hover:text-white transition-colors">Shipping & Returns</a></li>
                <li><a href="#" className="hover:text-white transition-colors">Size Guide</a></li>
                <li><a href="#" className="hover:text-white transition-colors">Contact Us</a></li>
              </ul>
            </div>
            <div>
              <h5 className="text-white font-bold mb-4 uppercase tracking-wider text-xs">Newsletter</h5>
              <p className="text-slate-300 text-sm mb-4">
                Join our community and receive 20% off your first order.
              </p>
              <div className="flex">
                <input
                  type="email"
                  placeholder="Enter your email"
                  className="flex-1 bg-white/10 border border-white/20 rounded-md px-4 py-2 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
                />
                <button className="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-md font-semibold transition-colors">
                  Subscribe
                </button>
              </div>
            </div>
          </div>
          <div className="border-t border-white/10 mt-12 pt-8 text-center text-slate-400 text-sm">
            <p>&copy; {new Date().getFullYear()} Athletica. All rights reserved. Precision performance guaranteed.</p>
          </div>
        </div>
      </footer>
    )

    const App = () => (
      <div className="min-h-screen flex flex-col">
        <Navigation />
        <main className="flex-1">
          <Hero />
          <Features />
          <ProductsGrid />
        </main>
        <Footer />
      </div>
    )

    createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
